---
opnsense_firewall_manage: true
opnsense_dnsmasq_manage: true
opnsense_unbound_manage: true

opnsense_firewall_rules:
  # docs/network.md: LAN devices need explicit access to view the NVR.
  # CAMERAS/IOT isolation needs no rules of its own - OPNsense's default
  # deny-all on new interfaces already blocks everything not listed here.
  - description: Allow LAN to CAMERAS (NVR access)
    interface: [lan]
    action: pass
    # TODO: harden - source_net is "any" LAN device for now. Narrow this to
    # an alias of specific trusted devices (with a static IP/DHCP reservation
    # each) once known, instead of allowing the whole LAN subnet.
    source_net: any
    destination_net: "{{ opnsense_cameras_subnet }}"

opnsense_dnsmasq_ranges:
  - description: LAN DHCP range
    interface: LAN
    start_addr: "{{ opnsense_lan_dhcp_start }}"
    end_addr: "{{ opnsense_lan_dhcp_end }}"
  - description: IOT DHCP range
    interface: IoT
    start_addr: "{{ opnsense_iot_dhcp_start }}"
    end_addr: "{{ opnsense_iot_dhcp_end }}"

opnsense_unbound_forwards:
  # Each interface's DHCP still hands out OPNsense's own gateway IP as the
  # DNS server (CAMERAS/IOT can't reach Technitium directly - see firewall
  # rules above); this forwards just the internal zone from there.
  - domain: "{{ local_domain }}"
    target: "{{ technitium_host }}"
  # Blank domain = catch-all: forwards everything else (not matched by a
  # more specific domain above) to these, instead of Unbound doing full
  # recursive resolution itself from root servers.
  - domain: ""
    target: 1.1.1.1
  - domain: ""
    target: 8.8.8.8
