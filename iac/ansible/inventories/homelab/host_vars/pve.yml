---
proxmox_storage_manage: true
proxmox_storage_disks:
  - device: /dev/sdb1
    vg_name: vmstore
    storage_id: local-vmstore
    content: images,rootdir

proxmox_gpu_passthrough_manage: true
proxmox_gpu_passthrough_iommu_vendor: intel
proxmox_gpu_passthrough_pci_ids:
  - "10de:1c03"

proxmox_vm_templates_manage: true
proxmox_vm_templates:
  - name: ubuntu-2404
    vmid: 9000
    image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
    storage: local-vmstore
    bridge: vmbr0
    disk_size: 20G

proxmox_lxc_templates_manage: true
proxmox_lxc_template_storage: local
proxmox_lxc_templates:
  - ubuntu-24.04-standard_24.04-2_amd64.tar.zst

proxmox_backup_manage: true
proxmox_backup_nfs_storage_id: nas-backup
proxmox_backup_nfs_server: "{{ nas_backup_server }}"
proxmox_backup_nfs_export: "{{ nas_backup_export }}"

proxmox_backup_jobs:
  - id: daily-vm-backup
    schedule: "02:00"
    storage: nas-backup
    guests: all
    mode: snapshot
    compress: zstd
    retention: "keep-last=7,keep-daily=7,keep-weekly=4,keep-monthly=3"
