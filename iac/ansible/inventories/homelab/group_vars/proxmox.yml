---
ansible_user: "{{ admin_user_name }}"
ansible_ssh_private_key_file: "{{ ssh_key_path }}"

proxmox_required_packages:
  - sudo

proxmox_manage_admin_user: true
proxmox_admin_user_realm: pam
proxmox_admin_user_comment: "Ansible management user"
proxmox_admin_user_acl_path: /
proxmox_admin_user_role: Administrator
