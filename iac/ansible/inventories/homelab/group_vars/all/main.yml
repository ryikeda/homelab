---
initial_user: root
# Keep real passwords out of git. Put local values in an ignored file:
#   inventories/homelab/group_vars/all/local.yml
initial_password: ""

admin_user_name: ansible
# This must be a Linux password hash, not the plaintext password.
# Generate one locally with one of:
#   mkpasswd --method=yescrypt
#   openssl passwd -6
# Then put it in inventories/homelab/group_vars/all/local.yml.
# Proxmox pam users authenticate with the plaintext password that matches this hash.
admin_user_password_hash: ""
admin_user_update_password: on_create
admin_user_groups:
  - sudo
admin_user_shell: /bin/bash
admin_user_sudo_nopasswd: true

ssh_key_name: ansible
ssh_key_dir: "{{ lookup('env', 'HOME') }}/.ssh"
ssh_key_path: "{{ ssh_key_dir }}/{{ ssh_key_name }}"
ssh_pubkey_path: "{{ ssh_key_path }}.pub"
ssh_generate_local_key: true

common_packages: []
maintenance_auto_reboot: false
maintenance_reboot_timeout_seconds: 300
