---
all:
  children:
    proxmox:
      hosts:
        pve:
          ansible_host: "{{ pve_host }}"
          ansible_python_interpreter: /usr/bin/python3
    linux:
      hosts:
        # VM for testing ansible iac setup, remove once config is stable
        ubuntu:
          ansible_host: "{{ ubuntu_host }}"
          ansible_python_interpreter: /usr/bin/python3
    opnsense:
      hosts:
        # OPNsense is configured via its REST API (ansibleguy.opnsense), not
        # SSH - tasks run locally on the controller and call out over HTTPS.
        router:
          ansible_connection: local
          # The ansibleguy.opnsense modules need the 'httpx' package. If the
          # Python interpreter Ansible normally uses doesn't have it
          # installed, point this at one that does.
          ansible_python_interpreter: "{{ opnsense_ansible_python_interpreter }}"
