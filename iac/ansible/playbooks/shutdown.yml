---
- name: Shut down selected hosts
  # Explicit allow-list, not "all" - opnsense's router host uses
  # ansible_connection: local, so an "all" pattern would run this locally on
  # the controller instead of skipping it, shutting down the wrong machine.
  hosts: proxmox:linux
  gather_facts: false
  become: true
  roles:
    - shutdown
