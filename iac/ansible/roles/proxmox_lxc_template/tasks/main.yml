---
- name: Manage LXC container templates
  when: proxmox_lxc_templates_manage | bool
  block:
    - name: Refresh the Proxmox appliance template catalog
      ansible.builtin.command: pveam update
      changed_when: false

    - name: Check which container templates are already downloaded
      ansible.builtin.command: pveam list {{ proxmox_lxc_template_storage }}
      register: proxmox_lxc_template_list
      changed_when: false

    - name: Download missing container templates
      ansible.builtin.command: pveam download {{ proxmox_lxc_template_storage }} {{ item }}
      loop: "{{ proxmox_lxc_templates }}"
      loop_control:
        label: "{{ item }}"
      when: (proxmox_lxc_template_storage + ':vztmpl/' + item) not in proxmox_lxc_template_list.stdout
      changed_when: true

    - name: Report LXC container template status
      ansible.builtin.debug:
        msg: >-
          Template '{{ item }}' on {{ proxmox_lxc_template_storage }}
          {{
            'is present.'
            if (proxmox_lxc_template_storage + ':vztmpl/' + item) in proxmox_lxc_template_list.stdout
            else 'was downloaded.'
          }}
      loop: "{{ proxmox_lxc_templates }}"
      loop_control:
        label: "{{ item }}"
